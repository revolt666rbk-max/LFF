<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛡️ SELFBOT PRO – Dashboard</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0a0e17;
            color: #e6edf3;
            min-height: 100vh;
            padding: 20px;
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0a0e17; }
        ::-webkit-scrollbar-thumb { background: #1f6feb; border-radius: 10px; }
        .container { max-width: 1400px; margin: 0 auto; }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid #1c2333;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }
        .logo { display: flex; align-items: center; gap: 12px; }
        .logo h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #58a6ff, #1f6feb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .logo span {
            font-size: 14px;
            color: #8b949e;
            background: #161b22;
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid #30363d;
        }
        .status-badge {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 18px;
            border-radius: 30px;
            background: #161b22;
            border: 1px solid #30363d;
        }
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
        }
        .status-dot.online { background: #2ea043; box-shadow: 0 0 10px #2ea04366; }
        .status-dot.offline { background: #8b949e; }
        .status-dot.error { background: #da3633; box-shadow: 0 0 10px #da363366; }
        .uptime { color: #8b949e; font-size: 13px; margin-left: 5px; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #161b22;
            border: 1px solid #1c2333;
            border-radius: 16px;
            padding: 20px 22px;
            transition: all 0.3s ease;
        }
        .stat-card:hover { border-color: #1f6feb; transform: translateY(-3px); }
        .stat-card .label { color: #8b949e; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
        .stat-card .value { font-size: 28px; font-weight: 700; margin-top: 6px; color: #f0f6fc; }
        .stat-card .value.green { color: #2ea043; }
        .stat-card .value.blue { color: #58a6ff; }
        .stat-card .value.orange { color: #d29922; }
        .stat-card .value.pink { color: #f778ba; }
        .card {
            background: #161b22;
            border: 1px solid #1c2333;
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 25px;
        }
        .card-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .card-title .badge {
            font-size: 12px;
            background: #1f6feb33;
            color: #58a6ff;
            padding: 2px 12px;
            border-radius: 20px;
        }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; color: #8b949e; font-size: 13px; margin-bottom: 5px; font-weight: 500; }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 10px;
            color: #e6edf3;
            font-size: 14px;
            transition: 0.3s;
        }
        .form-group input:focus { outline: none; border-color: #1f6feb; box-shadow: 0 0 0 3px #1f6feb33; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .btn-group { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 10px; }
        .btn {
            padding: 12px 28px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn:hover { transform: translateY(-2px); opacity: 0.9; }
        .btn-success { background: #2ea043; color: white; }
        .btn-danger { background: #da3633; color: white; }
        .btn-primary { background: #1f6feb; color: white; }
        .btn-secondary { background: #21262d; color: #c9d1d9; border: 1px solid #30363d; }
        .log-container { max-height: 450px; overflow-y: auto; }
        .log-item {
            display: flex;
            gap: 15px;
            padding: 12px 16px;
            background: #0d1117;
            border-radius: 10px;
            margin-bottom: 8px;
            border-left: 3px solid #1f6feb;
            transition: 0.2s;
        }
        .log-item:hover { background: #161b22; }
        .log-item .icon { font-size: 18px; line-height: 1.4; }
        .log-item .content { flex: 1; }
        .log-item .content .user { font-weight: 600; color: #58a6ff; }
        .log-item .content .msg { color: #c9d1d9; font-size: 14px; margin-top: 2px; }
        .log-item .content .meta { color: #8b949e; font-size: 12px; margin-top: 4px; }
        .log-item.ticket { border-left-color: #d29922; }
        .log-item.member { border-left-color: #2ea043; }
        .log-item.error { border-left-color: #da3633; }
        .log-item.system { border-left-color: #58a6ff; }
        @media (max-width: 768px) {
            .header { flex-direction: column; align-items: stretch; }
            .form-row { grid-template-columns: 1fr; }
            .grid { grid-template-columns: 1fr 1fr; }
            .btn-group { flex-direction: column; }
            .btn { justify-content: center; }
        }
        @media (max-width: 480px) { .grid { grid-template-columns: 1fr; } .logo h1 { font-size: 22px; } }
        .empty-state { text-align: center; padding: 40px 20px; color: #8b949e; }
        .empty-state .big-icon { font-size: 48px; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="logo">
                <h1>🛡️ SELFBOT PRO</h1>
                <span>v1.0</span>
            </div>
            <div class="status-badge">
                <span class="status-dot offline" id="statusDot"></span>
                <span id="statusText">⏹️ Stopped</span>
                <span class="uptime" id="uptimeText">⏱️ --</span>
            </div>
        </header>

        <div class="grid">
            <div class="stat-card">
                <div class="label">📊 Total Reports</div>
                <div class="value blue" id="totalLogs">0</div>
            </div>
            <div class="stat-card">
                <div class="label">🎫 Tickets</div>
                <div class="value orange" id="ticketCount">0</div>
            </div>
            <div class="stat-card">
                <div class="label">👤 Members Joined</div>
                <div class="value green" id="memberCount">0</div>
            </div>
            <div class="stat-card">
                <div class="label">⏱️ Uptime</div>
                <div class="value pink" id="uptimeStats">--</div>
            </div>
        </div>

        <div class="card">
            <div class="card-title">⚙️ Settings <span class="badge">Required for restart</span></div>
            <div class="form-group">
                <label>🔑 Token</label>
                <input type="password" id="tokenInput" placeholder="Enter your token here">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>📢 Log Channel ID</label>
                    <input type="text" id="channelInput" placeholder="Channel ID">
                </div>
                <div class="form-group">
                    <label>🔍 Keywords (comma separated)</label>
                    <input type="text" id="keywordsInput" placeholder="ticket,support,purchase,buy,help">
                </div>
            </div>
            <div class="btn-group">
                <button class="btn btn-secondary" id="saveBtn">💾 Save</button>
                <button class="btn btn-success" id="startBtn">▶️ Start</button>
                <button class="btn btn-danger" id="stopBtn">⏹️ Stop</button>
            </div>
        </div>

        <div class="card">
            <div class="card-title">📋 Logs <span class="badge" id="logCount">0</span></div>
            <div class="log-container" id="logContainer">
                <div class="empty-state">
                    <div class="big-icon">📭</div>
                    <p>No logs yet</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API = window.location.origin;

        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const uptimeText = document.getElementById('uptimeText');
        const uptimeStats = document.getElementById('uptimeStats');
        const tokenInput = document.getElementById('tokenInput');
        const channelInput = document.getElementById('channelInput');
        const keywordsInput = document.getElementById('keywordsInput');
        const logContainer = document.getElementById('logContainer');
        const totalLogs = document.getElementById('totalLogs');
        const ticketCount = document.getElementById('ticketCount');
        const memberCount = document.getElementById('memberCount');
        const logCount = document.getElementById('logCount');

        async function loadStatus() {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();
                const status = data.status;
                if (status === 'running') {
                    statusDot.className = 'status-dot online';
                    statusText.textContent = '🟢 Running';
                } else if (status === 'error') {
                    statusDot.className = 'status-dot error';
                    statusText.textContent = '🔴 Error';
                } else {
                    statusDot.className = 'status-dot offline';
                    statusText.textContent = '⏹️ Stopped';
                }
                const uptime = data.uptime || 0;
                const hours = Math.floor(uptime / 3600);
                const minutes = Math.floor((uptime % 3600) / 60);
                const seconds = uptime % 60;
                const uptimeStr = hours > 0 ? `${hours}h ${minutes}m ${seconds}s` : `${minutes}m ${seconds}s`;
                uptimeText.textContent = `⏱️ ${uptimeStr}`;
                uptimeStats.textContent = uptimeStr;
                if (data.config) {
                    tokenInput.value = data.config.token || '';
                    channelInput.value = data.config.logChannelId || '';
                    keywordsInput.value = (data.config.keywords || []).join(', ');
                }
                loadLogs();
            } catch (e) { console.error(e); }
        }

        async function loadLogs() {
            try {
                const res = await fetch('/api/logs?limit=50');
                const logs = await res.json();
                if (logs.length === 0) {
                    logContainer.innerHTML = `<div class="empty-state"><div class="big-icon">📭</div><p>No logs yet</p></div>`;
                    logCount.textContent = '0';
                    return;
                }
                let html = '', tickets = 0, members = 0;
                logs.forEach(log => {
                    if (log.type === 'ticket') tickets++;
                    if (log.type === 'member') members++;
                    let icon = '📝', cls = '';
                    if (log.type === 'ticket') { icon = '🎫'; cls = 'ticket'; }
                    else if (log.type === 'member') { icon = '👤'; cls = 'member'; }
                    else if (log.type === 'error') { icon = '❌'; cls = 'error'; }
                    else if (log.type === 'system') { icon = '⚙️'; cls = 'system'; }
                    const time = new Date(log.timestamp).toLocaleString();
                    html += `<div class="log-item ${cls}">
                        <span class="icon">${icon}</span>
                        <div class="content">
                            <span class="user">${log.user || 'System'}</span>
                            ${log.message ? `<div class="msg">${log.message}</div>` : ''}
                            ${log.content ? `<div class="msg">📨 ${log.content}</div>` : ''}
                            ${log.server ? `<div class="meta">📌 ${log.server}</div>` : ''}
                            <div class="meta">🕒 ${time}</div>
                        </div>
                    </div>`;
                });
                logContainer.innerHTML = html;
                logCount.textContent = logs.length;
                totalLogs.textContent = logs.length;
                ticketCount.textContent = tickets;
                memberCount.textContent = members;
            } catch (e) { console.error(e); }
        }

        document.getElementById('saveBtn').addEventListener('click', async () => {
            const payload = { token: tokenInput.value, logChannelId: channelInput.value, keywords: keywordsInput.value };
            try {
                const res = await fetch('/api/config', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                const data = await res.json();
                alert(data.success ? '✅ Saved successfully!' : '❌ Failed to save');
            } catch { alert('❌ Connection error'); }
        });

        document.getElementById('startBtn').addEventListener('click', async () => {
            try {
                const res = await fetch('/api/start', { method: 'POST' });
                const data = await res.json();
                if (data.success) { alert('✅ Bot started!'); loadStatus(); } 
                else { alert('❌ ' + (data.error || 'Failed to start')); }
            } catch { alert('❌ Connection error'); }
        });

        document.getElementById('stopBtn').addEventListener('click', async () => {
            try { await fetch('/api/stop', { method: 'POST' }); alert('⏹️ Bot stopped'); loadStatus(); } 
            catch { alert('❌ Failed to stop'); }
        });

        setInterval(loadStatus, 5000);
        loadStatus();
    </script>
</body>
</html>
